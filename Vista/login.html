<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Biblioteca Personal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-card">
            <div class="login-icon">
                <i class="fa-solid fa-book-open-reader"></i>
            </div>

            <h1>Biblioteca Personal</h1>
            <p id="login-subtitle">Inicia sesión para entrar a tu catálogo.</p>

            <div class="auth-tabs">
                <button type="button" class="auth-tab active" id="tab-login">Entrar</button>
                <button type="button" class="auth-tab" id="tab-register">Crear cuenta</button>
            </div>

            <form id="auth-form">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" required placeholder="Ingresa tu usuario" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="Ingresa tu contraseña" autocomplete="current-password">
                </div>

                <div class="form-group" id="confirm-group" style="display: none;">
                    <label for="confirm-password">Confirmar contraseña</label>
                    <input type="password" id="confirm-password" placeholder="Repite tu contraseña" autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary btn-login" id="btn-auth">
                    <i class="fa-solid fa-right-to-bracket"></i> Entrar
                </button>

                <p id="auth-message" class="login-error"></p>
            </form>
        </div>
    </div>

    <script>
        const authForm = document.getElementById('auth-form');
        const authMessage = document.getElementById('auth-message');
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const btnAuth = document.getElementById('btn-auth');
        const confirmGroup = document.getElementById('confirm-group');
        const confirmPassword = document.getElementById('confirm-password');
        const passwordInput = document.getElementById('password');
        const subtitle = document.getElementById('login-subtitle');

        let modo = 'login';

        function cambiarModo(nuevoModo) {
            modo = nuevoModo;
            authMessage.textContent = '';
            authMessage.classList.remove('login-success');
            authMessage.classList.add('login-error');
            authForm.reset();

            if (modo === 'login') {
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                confirmGroup.style.display = 'none';
                confirmPassword.required = false;
                passwordInput.autocomplete = 'current-password';
                subtitle.textContent = 'Inicia sesión para entrar a tu catálogo.';
                btnAuth.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar';
            } else {
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
                confirmGroup.style.display = 'block';
                confirmPassword.required = true;
                passwordInput.autocomplete = 'new-password';
                subtitle.textContent = 'Crea una cuenta nueva para guardar tus libros.';
                btnAuth.innerHTML = '<i class="fa-solid fa-user-plus"></i> Crear cuenta';
            }
        }

        async function verificarSiYaInicioSesion() {
            try {
                const response = await fetch('../Controlador/verificar_sesion.php');
                const data = await response.json();

                if (data.logueado) {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error('No se pudo verificar la sesión:', error);
            }
        }

        authForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            authMessage.textContent = '';
            authMessage.classList.remove('login-success');
            authMessage.classList.add('login-error');

            const usuario = document.getElementById('usuario').value.trim();
            const password = passwordInput.value.trim();
            const passwordConfirmada = confirmPassword.value.trim();

            if (modo === 'register' && password !== passwordConfirmada) {
                authMessage.textContent = 'Las contraseñas no coinciden.';
                return;
            }

            const endpoint = modo === 'login' ? 'login.php' : 'registrar.php';

            try {
                const response = await fetch(`../Controlador/${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ usuario, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    if (modo === 'register') {
                        authMessage.classList.remove('login-error');
                        authMessage.classList.add('login-success');
                        authMessage.textContent = 'Cuenta creada correctamente. Entrando...';
                    }

                    window.location.href = 'index.html';
                } else {
                    authMessage.textContent = data.error || 'No se pudo completar la acción.';
                }
            } catch (error) {
                authMessage.textContent = 'Error al conectar con el servidor.';
            }
        });

        tabLogin.addEventListener('click', () => cambiarModo('login'));
        tabRegister.addEventListener('click', () => cambiarModo('register'));

        verificarSiYaInicioSesion();
    </script>

</body>
</html>
